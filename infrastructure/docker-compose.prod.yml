# Production override for AWS EC2.
# Usage: docker compose -f infrastructure/docker-compose.yml -f infrastructure/docker-compose.prod.yml up -d
#
# Backend uses host networking for AWS SSM / IMDSv2 access.
# Frontend proxies API traffic to the host-bound backend via host.docker.internal.
services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_READ_API_KEY=${READ_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    volumes:
      - ../frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    network_mode: host
    environment:
      - DB_HOST=127.0.0.1
      - READ_API_KEY=${READ_API_KEY}
      - WRITE_API_KEY=${WRITE_API_KEY}
